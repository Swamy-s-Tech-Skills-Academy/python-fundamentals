name: Docs Quality

on:
  # Manual run capability (use Run workflow button in GitHub UI)
  workflow_dispatch: {}
  pull_request:
    branches: [main, 'swamy/**']
    paths:
      - "README.md"
      - "docs/**/*.md"
      - ".github/**/*.md"
      - "lychee.toml"
      - ".markdownlint.*"
      - ".markdownlint-cli2.yaml"
      - ".markdownlintignore"
      - ".github/workflows/docs-quality.yml"
  push:
    branches: [main, 'swamy/**']
    paths:
      - "README.md"
      - "docs/**/*.md"
      - ".github/**/*.md"
      - "lychee.toml"
      - ".markdownlint.*"
      - ".markdownlint-cli2.yaml"
      - ".markdownlintignore"
      - ".github/workflows/docs-quality.yml"

concurrency:
  group: docs-quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25 # v24.0.0
        with:
          globs: |
            README.md
            docs/**/*.md
            .github/**/*.md

  link-check:
    name: Link Check (Lychee)
    runs-on: ubuntu-latest
    needs: markdownlint
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run Lychee link checker
        id: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >-
            --config lychee.toml --no-progress
            README.md
            docs/**/*.md
            .github/**/*.md
          fail: true
      - name: Upload Lychee report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lychee-report
          path: lychee/out.md
